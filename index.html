<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do you wanna be my girlfriend?</title>
<style>
  :root{
    --bg-deep: #1a0f1f;
    --bg-mid: #3a1b3f;
    --pink-glow: #ff5da2;
    --pink-soft: #ffb3d1;
    --cream: #fff6f2;
    --gold: #ffd27a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }

  body {
    background: radial-gradient(ellipse at 50% 20%, var(--bg-mid), var(--bg-deep) 70%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* No floating hearts */

  .card {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 48px 40px;
    max-width: 480px;
    width: 90%;
  }

  .eyebrow {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
    font-weight: 600;
  }

  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(28px, 5vw, 42px);
    color: var(--cream);
    line-height: 1.35;
    margin: 0 0 12px 0;
    text-shadow: 0 0 30px rgba(255, 93, 162, 0.35);
  }

  .sub {
    color: var(--pink-soft);
    font-size: 15px;
    margin-bottom: 44px;
    opacity: 0.85;
  }

  .buttons {
    position: relative;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  button {
    border: none;
    border-radius: 999px;
    font-size: 17px;
    font-weight: 600;
    padding: 16px 34px;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  #yes {
    background: linear-gradient(135deg, #ff7ab8, #ff4f9a);
    color: #fff;
    box-shadow: 0 8px 24px rgba(255, 79, 154, 0.45);
  }

  #yes:hover {
    transform: scale(1.06);
    box-shadow: 0 10px 30px rgba(255, 79, 154, 0.6);
  }

  #yes.grown {
    transform: scale(1.9);
  }

  #no {
    background: rgba(255, 255, 255, 0.08);
    color: var(--pink-soft);
    border: 1px solid rgba(255, 179, 209, 0.4);
    position: relative;
  }

  #no.escaping {
    position: fixed;
    transition: top 0.18s ease, left 0.18s ease;
    z-index: 50;
  }

  #result {
    margin-top: 28px;
    font-size: 16px;
    color: var(--gold);
    min-height: 24px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #result.show { opacity: 1; }

  .signature {
    position: absolute;
    top: -14px;
    right: 6%;
    font-size: 34px;
    animation: pulse 1.6s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  #celebration-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 6, 18, 0.88);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  #celebration-overlay.show {
    display: flex;
    opacity: 1;
  }

  .cat-frame {
    background: #fffaf6;
    padding: 14px;
    border-radius: 22px;
    box-shadow: 0 20px 60px rgba(255, 79, 154, 0.5);
    animation: pop-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
               laugh-shake 0.45s ease-in-out 0.35s infinite;
  }

  #celebration-overlay img {
    display: block;
    max-width: min(75vw, 380px);
    max-height: 65vh;
    border-radius: 12px;
  }

  @keyframes pop-in {
    0%   { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes laugh-shake {
    0%, 100% { transform: rotate(0deg) translate(0, 0); }
    20%      { transform: rotate(-3deg) translate(-3px, 1px); }
    40%      { transform: rotate(3deg) translate(3px, -1px); }
    60%      { transform: rotate(-2deg) translate(-2px, 1px); }
    80%      { transform: rotate(2deg) translate(2px, -1px); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow">Một câu hỏi quan trọng</div>
  <span class="signature">✨</span>
  <h1>Do you wanna be<br>my girlfriend?</h1>
  <div class="sub">Chọn đi, Híu đợi câu trả lời của Hải An :></div>

  <div class="buttons" id="buttonZone">
    <button id="yes">Có chứ </button>
    <button id="no">Không nhé</button>
  </div>

  <div id="result"></div>
</div>

<div id="celebration-overlay">
  <div class="cat-frame">
    <img src="cat-meme.png" alt="Vui quá trời vui">
  </div>
</div>

<audio id="love-sound" src="love.mp3" preload="auto"></audio>

<script>
  const noBtn = document.getElementById('no');
  const yesBtn = document.getElementById('yes');
  const zone = document.getElementById('buttonZone');
  const result = document.getElementById('result');
  let escapeCount = 0;

  function moveNoButton() {
    escapeCount++;

    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;
    const margin = 20;

    const maxLeft = window.innerWidth - btnWidth - margin;
    const maxTop = window.innerHeight - btnHeight - margin;

    const newLeft = Math.max(margin, Math.random() * maxLeft);
    const newTop = Math.max(margin, Math.random() * maxTop);

    noBtn.classList.add('escaping');
    noBtn.style.left = newLeft + 'px';
    noBtn.style.top = newTop + 'px';

    // "yes" button grows a little each time, and text gets more playful
    if (escapeCount <= 6) {
      const msgs = [
        'Hải An chắc chưa nạ? 🥺',
        'Ơ tề Hải An, răng chạy trốn câu trả lời rứa :))',
        'Nút "không" trốn rồi tề :)) 😆',
        'Hải An cố lên bắt đi =)))~',
        'Hình như hấn nỏ muốn bị bấm 😏',
        'Thôi bấm "Có chứ" cho xong đi Hải An, này khê=))) '
      ];
      result.textContent = msgs[Math.min(escapeCount - 1, msgs.length - 1)];
      result.classList.add('show');
    }

    yesBtn.style.transform = `scale(${1 + Math.min(escapeCount * 0.08, 0.9)})`;
  }

  // Trigger on hover (mouse) and on click/touch (mobile) so it never gets caught
  noBtn.addEventListener('mouseenter', moveNoButton);
  noBtn.addEventListener('click', (e) => {
    e.preventDefault();
    moveNoButton();
  });
  noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    moveNoButton();
  }, { passive: false });

  yesBtn.addEventListener('click', () => {
    const overlay = document.getElementById('celebration-overlay');
    const sound = document.getElementById('love-sound');

    overlay.classList.add('show');
    sound.currentTime = 0;
    sound.play().catch(() => {
      // Trình duyệt có thể chặn autoplay âm thanh cho tới khi có tương tác,
      // nhưng vì đây là trong sự kiện click nên thường sẽ phát được bình thường.
    });

    setTimeout(() => {
      overlay.classList.remove('show');
      sound.pause();

      document.querySelector('.card').innerHTML = `
        <div class="eyebrow">Yayyy 🎉</div>
        <div class="sub" style="margin-bottom:0;">Hải An thử kéo trái tim đi khắp màn hình xem~ Nhả ra hấn quay về á</div>
      `;
      initPinHeart();
    }, 3000);
  });

  // ---- Viền trái tim ghép từ các mũi kim ánh sáng, phủ toàn màn hình, di chuyển thật chậm ----
  function initPinHeart() {
    const canvas = document.createElement('canvas');
    canvas.id = 'heart-canvas';
    canvas.style.position = 'fixed';
    canvas.style.inset = '0';
    canvas.style.width = '100vw';
    canvas.style.height = '100vh';
    canvas.style.zIndex = '60';
    canvas.style.cursor = 'grab';
    canvas.style.touchAction = 'none';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    let W = window.innerWidth, H = window.innerHeight;
    let DPR = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      rebuildPins();
    }

    let cx, cy, scale, pins;

    function heartPoint(t) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
      return { x: cx + x * scale, y: cy + y * scale };
    }

    function rebuildPins() {
      cx = W / 2;
      cy = H / 2;
      scale = Math.min(W, H) / 34;

      const COUNT = 480;
      const old = pins;
      pins = [];
      for (let i = 0; i < COUNT; i++) {
        const t = (i / COUNT) * Math.PI * 2;
        const p = heartPoint(t);
        const angle = Math.atan2(p.y - cy, p.x - cx);
        const keep = old && old[i];
        pins.push({
          hx: p.x, hy: p.y,
          x: keep ? old[i].x : p.x,
          y: keep ? old[i].y : p.y,
          vx: keep ? old[i].vx : 0,
          vy: keep ? old[i].vy : 0,
          angle,
          origAngle: angle,
          len: 15 + Math.random() * 5,
          colorA: Math.random() < 0.5 ? '#fff6f2' : '#ffd27a',
          colorB: '#ff5da2'
        });
      }
    }

    resize();
    window.addEventListener('resize', resize);

    let dragging = false;
    let grabIndex = -1;
    let mouse = { x: cx, y: cy };

    // Lịch sử vị trí của mũi kim đang bị nắm. Các mũi kim khác sẽ "đi lại"
    // đúng con đường này, trễ hơn theo thứ tự -> xếp hàng thẳng, không loạn.
    let trailHistory = [];
    const DELAY_PER_STEP = 5;   // càng lớn, đuôi càng "giãn" ra xa nhau và vào hàng càng chậm, rõ
    const MAX_HISTORY = 400;

    function getPos(e) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX, y: clientY };
    }

    function nearestPinIndex(pos) {
      let best = 0, bestD = Infinity;
      pins.forEach((p, i) => {
        const d = (p.x - pos.x) ** 2 + (p.y - pos.y) ** 2;
        if (d < bestD) { bestD = d; best = i; }
      });
      return best;
    }

    function onDown(e) {
      mouse = getPos(e);
      grabIndex = nearestPinIndex(mouse);
      dragging = true;
      trailHistory = [{ x: pins[grabIndex].x, y: pins[grabIndex].y }];
      canvas.style.cursor = 'grabbing';
      e.preventDefault();
    }
    function onMove(e) {
      if (!dragging) return;
      mouse = getPos(e);
      e.preventDefault();
    }
    function onUp() {
      dragging = false;
      grabIndex = -1;
      canvas.style.cursor = 'grab';
    }

    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    canvas.addEventListener('touchstart', onDown, { passive: false });
    canvas.addEventListener('touchmove', onMove, { passive: false });
    canvas.addEventListener('touchend', onUp);

    function drawNeedle(p) {
      const dx = Math.cos(p.angle), dy = Math.sin(p.angle);
      const px = -dy, py = dx;
      const half = p.len / 2;
      const waist = 1.6;

      const tip1 = { x: p.x + dx * half, y: p.y + dy * half };
      const tip2 = { x: p.x - dx * half, y: p.y - dy * half };
      const side1 = { x: p.x + px * waist, y: p.y + py * waist };
      const side2 = { x: p.x - px * waist, y: p.y - py * waist };

      const grad = ctx.createLinearGradient(tip1.x, tip1.y, tip2.x, tip2.y);
      grad.addColorStop(0, p.colorA);
      grad.addColorStop(0.5, p.colorB);
      grad.addColorStop(1, p.colorA);

      ctx.beginPath();
      ctx.moveTo(tip1.x, tip1.y);
      ctx.lineTo(side1.x, side1.y);
      ctx.lineTo(tip2.x, tip2.y);
      ctx.lineTo(side2.x, side2.y);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.shadowColor = p.colorB;
      ctx.shadowBlur = 9;
      ctx.fill();
    }

    function tick() {
      ctx.clearRect(0, 0, W, H);

      if (dragging) {
        // Mũi kim được nắm bám theo chuột (mượt nhẹ).
        const g = pins[grabIndex];
        g.vx = (g.vx + (mouse.x - g.x) * 0.06) * 0.85;
        g.vy = (g.vy + (mouse.y - g.y) * 0.06) * 0.85;
        g.x += g.vx;
        g.y += g.vy;

        // Ghi lại đường đi của nó vào lịch sử.
        trailHistory.unshift({ x: g.x, y: g.y });
        if (trailHistory.length > MAX_HISTORY) trailHistory.length = MAX_HISTORY;

        // Các mũi kim còn lại (cả 2 phía) đi lại đúng con đường đó,
        // mỗi mũi trễ hơn mũi trước theo đúng thứ tự -> xếp hàng thẳng lối,
        // bay lần lượt theo con trỏ, không dao động lung tung.
        const n = pins.length;
        for (let step = 1; step < Math.ceil(n / 2) + 1; step++) {
          const histIdx = step * DELAY_PER_STEP;
          // Chưa đủ lịch sử tới lượt kim này -> đứng yên tại chỗ, chưa nhập hàng.
          // Nhờ vậy các kim vào hàng LẦN LƯỢT theo thứ tự gần -> xa, không vón cục.
          if (histIdx >= trailHistory.length) continue;
          const target = trailHistory[histIdx];

          const iR = (grabIndex + step) % n;
          const iL = (grabIndex - step + n) % n;

          // Hướng cục bộ dọc theo đường kéo, để biết "vảy" phải xòe về phía nào.
          const refIdx = Math.min(histIdx + DELAY_PER_STEP, trailHistory.length - 1);
          const refPoint = trailHistory[refIdx] || target;
          const tanX0 = target.x - refPoint.x;
          const tanY0 = target.y - refPoint.y;
          const tanLen = Math.hypot(tanX0, tanY0) || 1;
          const tanX = tanX0 / tanLen;
          const tanY = tanY0 / tanLen;
          const perpX = -tanY;
          const perpY = tanX;
          const tangentAngle = Math.atan2(tanY, tanX);

          [iR, iL].forEach((i) => {
            if (i === grabIndex) return;
            const p = pins[i];

            // Vảy tủa nhẹ xen kẽ theo từng lớp, nhưng CÙNG một hàng
            // (không tách trái/phải) -> nhiều kim chồng dày trên 1 đường kéo.
            const fanPhase = (step % 2 === 0) ? 1 : -1;
            const fanSpread = 3 + step * 0.35;
            const tx = target.x + perpX * fanPhase * fanSpread;
            const ty = target.y + perpY * fanPhase * fanSpread;

            p.x += (tx - p.x) * 0.25;
            p.y += (ty - p.y) * 0.25;

            // Kim nằm song song với đường kéo, chỉ hơi so le nhau như vảy chồng lên nhau
            const wantAngle = tangentAngle + fanPhase * 0.2;
            p.angle += (wantAngle - p.angle) * 0.3;
          });
        }
      } else {
        // Thả ra: từng mũi kim bay siêu nhanh về đúng chỗ của mình
        for (const p of pins) {
          p.vx = (p.vx + (p.hx - p.x) * 0.075) * 0.85;
          p.vy = (p.vy + (p.hy - p.y) * 0.075) * 0.85;
          p.x += p.vx;
          p.y += p.vy;
          // và góc xoay cũng từ từ trở lại như ban đầu, hết "xòe vảy"
          p.angle += (p.origAngle - p.angle) * 0.12;
        }
      }

      for (const p of pins) drawNeedle(p);
      ctx.shadowBlur = 0;

      requestAnimationFrame(tick);
    }
    tick();
  }

  // No floating hearts

  // reposition no-button safely if window resizes while it's mid-escape
  window.addEventListener('resize', () => {
    if (noBtn.classList.contains('escaping')) {
      moveNoButton();
    }
  });
</script>

</body>
</html>
